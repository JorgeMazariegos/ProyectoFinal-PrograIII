<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="leaflet/leaflet.css"/>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script src="leaflet/leaflet.js"></script>

<script>

var carIcon = L.icon({
    iconUrl: 'car.png',
    iconSize: [32,32],
    iconAnchor: [16,16]
});

var vehiculo = null;

var map = L.map('map').setView([14.57220,-90.48200],13);
var graphLayer = L.layerGroup().addTo(map);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom: 19,
    keepBuffer: 12,
    updateWhenIdle: true
}
).addTo(map);

// Function to add markers
function agregarMarcador(lat, lng, nombre){
   L.marker([lat,lng])
    .addTo(graphLayer)
    .bindPopup(nombre);
}

// Function to draw a route
function dibujarRuta(coords){
    L.polyline(coords, {
        weight: 6
    }).addTo(graphLayer);
}

function agregarArista(lat1,lng1,lat2,lng2){
    L.polyline([
        [lat1,lng1],
        [lat2,lng2]
    ]).addTo(graphLayer);
}

function moverVehiculo(lat, lng){
    if(vehiculo == null){
        vehiculo = L.marker(
            [lat,lng],
            {icon: carIcon}
        ).addTo(graphLayer);
    }
    else{
        vehiculo.setLatLng([lat,lng]);
    }
    

    map.panTo([lat,lng]);
}

function hacerZoom(lat, lng){
    map.flyTo([lat,lng], 15, {
        duration: 1.5
    });
}

function limpiarMapa(){
    graphLayer.clearLayers();
    vehiculo = null;
}

</script>

</body>
</html>
